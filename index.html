<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mewing downloader solusi download ter jos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="downloader-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-download"></i>
            </div>
            <h1>Mewing Downloader</h1>
            <div class="subtitle">Support TikTok, Instagram, YouTube, Facebook & Twitter</div>
        </div>

        <div class="platform-selector" id="platformSelector">
            <div class="platform-btn active" data-platform="tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </div>
            <div class="platform-btn" data-platform="instagram">
                <i class="fab fa-instagram"></i> Instagram
            </div>
            <div class="platform-btn" data-platform="youtube">
                <i class="fab fa-youtube"></i> YouTube
            </div>
            <div class="platform-btn" data-platform="facebook">
                <i class="fab fa-facebook"></i> Facebook
            </div>
            <div class="platform-btn" data-platform="twitter">
                <i class="fab fa-twitter"></i> Twitter
            </div>
        </div>

        <div class="input-group">
            <div class="input-wrapper">
                <i class="fas fa-link"></i>
                <input type="text" id="urlInput" placeholder="Tempel link video di sini...">
            </div>
        </div>

        <button class="download-btn" id="downloadBtn">
            <i class="fas fa-cloud-download-alt"></i>
            Proses Download
        </button>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div>Memproses link...</div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-title">
                <i class="fas fa-list"></i>
                Hasil Download
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <div class="footer">
            <i class="fas fa-shield-alt"></i> Create by OrangGabut
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
