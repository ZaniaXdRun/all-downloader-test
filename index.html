<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mewing Downloader - TikTok, IG, YT, FB, Twitter, Pinterest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="downloader-card">
        <div class="card-header">
            <div class="logo-icon">
                <i class="fas fa-download"></i>
            </div>
            <h1>Mewing Downloader</h1>
            <p>Support TikTok, Instagram, YouTube, Facebook, Twitter & Pinterest</p>
        </div>

        <div class="platform-grid">
            <button class="platform-chip active" data-platform="tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </button>
            <button class="platform-chip" data-platform="instagram">
                <i class="fab fa-instagram"></i> IG
            </button>
            <button class="platform-chip" data-platform="youtube">
                <i class="fab fa-youtube"></i> YouTube
            </button>
            <button class="platform-chip" data-platform="facebook">
                <i class="fab fa-facebook-f"></i> FB
            </button>
            <button class="platform-chip" data-platform="twitter">
                <i class="fab fa-twitter"></i> Twitter
            </button>
            <button class="platform-chip" data-platform="pinterest">
                <i class="fab fa-pinterest"></i> Pinterest
            </button>
        </div>

        <div class="input-field">
            <i class="fas fa-link input-icon"></i>
            <input type="text" id="urlInput" placeholder="Tempel link video di sini...">
        </div>

        <button class="download-button" id="downloadBtn">
            <i class="fas fa-cloud-download-alt"></i>
            Proses Download
        </button>

        <div class="loading-state" id="loading">
            <div class="spinner"></div>
            <span>Memproses link...</span>
        </div>

        <div class="result-panel" id="resultArea">
            <div class="result-header">
                <i class="fas fa-list"></i>
                <span>Hasil Download</span>
            </div>
            <div class="result-list" id="resultContent"></div>
        </div>

        <div class="card-footer">
            <i class="fas fa-shield-alt"></i> Powered by vreden.my.id
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
